name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  unittest:
    # Proves the core runs on a bare Python with zero third-party packages,
    # which is the project's central promise: keyless and offline.
    name: stdlib unittest (no deps)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Byte-compile all sources
        run: python -m py_compile $(git ls-files '*.py')

      - name: Run the standard-library test suite
        run: python -m unittest discover -s tests
